<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inquiry Form - Pramukh Academy</title>
  <meta name="description" content="Standalone inquiry form for Pramukh Academy lead capture">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/leads.css">
  <link rel="stylesheet" href="css/inquiry-form.css">
</head>
<body class="inquiry-page">
  <div class="inquiry-shell">
    <header class="inquiry-topbar">
      <div class="inquiry-brand">
        <div class="inquiry-logo-mark">
          <img src="assets/Logo-04.png" alt="Pramukh Academy" />
        </div>
        <div>
          <div class="inquiry-brand-title">Pramukh Academy</div>
          <div class="inquiry-brand-sub">Standalone Inquiry Module</div>
        </div>
      </div>
      <div class="inquiry-topbar-actions">
        <button class="topbar-icon-btn" id="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle theme">
          <i class="fas fa-sun" id="theme-icon"></i>
        </button>
        <a class="btn btn-outline btn-sm" href="index.html">
          <i class="fas fa-arrow-left"></i> Back to CRM
        </a>
      </div>
    </header>

    <main class="inquiry-stage">
      <section class="inquiry-panel inquiry-form-panel">
        <div class="inquiry-hero">
          <div>
            <div class="inquiry-eyebrow">Inquiry Form</div>
            <h1 class="panel-title">Add Inquiry</h1>
            <p class="panel-subtitle">Capture student inquiry details with the same field set used in the CRM modal.</p>
          </div>
          <div class="inquiry-hero-meta">
            <span class="badge badge-primary">Premium Entry</span>
            <span class="badge badge-gray">Required fields marked *</span>
          </div>
        </div>

        <form id="inquiry-form" class="inquiry-form">
          <div class="modal-grid-2">
            <div class="form-field">
              <label>Full Name *</label>
              <input type="text" id="i-name" required >
            </div>
            <div class="form-field">
              <label>Contact No. *</label>
              <input type="tel" id="i-phone" required >
            </div>
            <div class="form-field">
              <label>Email ID *</label>
              <input type="email" id="i-email" required >
            </div>
            <div class="form-field">
              <label>State *</label>
              <select id="i-state" required>
                <option value="">Select State</option>
              </select>
            </div>
            <div class="form-field">
              <label>District *</label>
              <select id="i-district" required disabled>
                <option value="">Select District</option>
              </select>
            </div>
            <div class="form-field">
              <label>Academic Status *</label>
              <select id="i-academic-status" required>
                <option value="School Student">School Student</option>
                <option value="College Student" selected>College Student</option>
                <option value="Graducation Completed">Graducation Completed</option>
              </select>
            </div>
            <div class="form-field span-2">
              <label>Inquiry For *</label>
              <div class="radio-card-grid cols-2 inquiry-type-grid">
                <label class="radio-card">
                  <input type="radio" name="inquiryType" value="General Inquiry" checked required>
                  <span class="radio-mark"></span>
                  <span><span class="radio-title">General inquiry</span><span class="radio-subtitle">Ask a specific question</span></span>
                </label>
                <label class="radio-card">
                  <input type="radio" name="inquiryType" value="Course Inquiry" required>
                  <span class="radio-mark"></span>
                  <span><span class="radio-title">Course Inquiry</span><span class="radio-subtitle">Select course details</span></span>
                </label>
              </div>
            </div>
            <div class="form-field span-2" id="i-course-wrap" hidden>
              <label>Course *</label>
              <select id="i-course">
                <option value="">Select Course</option>
                <option value="UPSC">UPSC</option>
                <option value="GPSC-Class1,2">GPSC Class 1&2</option>
                <option value="Class -3">Class 3</option>
                <option value="Sankalp">Sankalp (For School Student)</option>
                <option value="Sampurn">Sampurn (For College Student)</option>
              </select>
            </div>
            <div class="form-field" id="i-batch-wrap" hidden>
              <label>Batch Selection (Optional)</label>
              <select id="i-batch">
                <option value="">Select Batch</option>
                <option value="Foundation">Foundation</option>
                <option value="mentorship">Mentorship</option>
                <option value="Interview">Interview</option>
                <option value="mains">Mains</option>
              </select>
            </div>
            <div class="form-field" id="i-mode-wrap" hidden>
              <label>Mode Of Learning *</label>
              <div class="radio-inline-group">
                <label class="radio-pill"><input type="radio" name="mode" value="Online">Online</label>
                <label class="radio-pill"><input type="radio" name="mode" value="Offline">Offline</label>
              </div>
            </div>
            <div class="form-field full" id="i-query-wrap">
              <label id="i-query-label">Any Specific Query *</label>
              <textarea id="i-query" rows="3" required ></textarea>
            </div>
          </div>

          <div class="inquiry-actions">
            <button class="btn btn-primary btn-sm" type="submit"><i class="fas fa-paper-plane"></i> Submit Inquiry</button>
            <span id="inquiry-status" class="form-status"></span>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script src="js/indian-locations.js"></script>
  <script src="js/inquiry-form.js"></script>
</body>
</html>
